<!DOCTYPE html>
<html>
<head>
    <title>Project: Recipe book</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            margin: 0;
        }

        h2 {
            color: #333;
        }

        ol {
            list-style-type: none;
            padding: 0;
        }

        ol li {
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #333;
            color: #fff;
        }

        p {
            line-height: 1.6;
            color: #555;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
   
    <h1>Your Name's Recipe Book</h1>
    
    <h2>Contents:</h2>
    
    <ol>
        <li><a href="#recipe1">Recipe #1</a></li>
    </ol>
    
    <h2 id="recipe1">Recipe #1</h2>
    
    <ul>
        <li>Time: _</li>
        <li>Serves: _</li>
    </ul>
    
    <table>
        <thead>
            <tr>
                <th>Ingredients</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ingredient 1</td>
                <td>Quantity 1</td>
            </tr>
            <tr>
                <td>Ingredient 2</td>
                <td>Quantity 2</td>
            </tr>
           
        </tbody>
    </table>
    
    <p><strong>Step 1:</strong> Do something.</p>
    <p><strong>Step 2:</strong> Do something else.</p>
   
    
    <p><em>Source: <a href="#">Some Recipe Website</a></em></p>

</body>
</html>
