<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Project: Event Invite</title>
        <style>
            body {
                font-family: 'Arial', sans-serif;
                background-color: #f4f4f4;
                text-align: center;
                margin: 50px;
            }

            h1 {
                color: #333;
            }

            h2 {
                color: #555;
            }

            p {
                color: #777;
            }

            ul {
                list-style: none;
                padding: 0;
            }

            li {
                margin: 10px 0;
            }

            .invite-container {
                background-color: #fff;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                max-width: 600px;
                margin: auto;
            }

            .rsvp-button {
                background-color: #3498db;
                color: #fff;
                padding: 10px 20px;
                text-decoration: none;
                border-radius: 5px;
                display: inline-block;
                margin-top: 20px;
            }

            .rsvp-button:hover {
                background-color: #258cd1;
            }
        </style>
    </head>
    <body>
        
        <div class="invite-container">
            <h1>You're Invited!</h1>
            <h2>To a Special Event</h2>
            
            <p>Join us for an exciting event filled with fun, laughter, and great memories!</p>
            
            <p>The details:</p>
            <ul>
                <li><strong>Date:</strong> [Event Date]</li>
                <li><strong>Time:</strong> [Event Time]</li>
                <li><strong>Location:</strong> [Event Location]</li>
                <li><strong>Dress Code:</strong> [Dress Code]</li>
            </ul>

            <a href="#" class="rsvp-button">RSVP Now</a>
        </div>

    </body>
</html>
