<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: Position planet</title>
        <style>
            #planet-container {
                position: relative; 
                width: 300px; 
            }
            
            #planet {
                width: 100%; 
            }

            #greeting {
                position: absolute; 
                top: 50px; 
                left: 20px; 
                background: rgb(255, 255, 0);
                border: 2px solid black;
                font-family: "Comic Sans MS", fantasy;
                padding: 5px;
                width: 262px;
                z-index: 1; 
            }
            #creature {
                position: absolute; 
                top: 120px; 
                left: 120px; 
                z-index: 0;
            }
        </style>
    </head>
    <body>
        
        <div id="planet-container">
            <img id="planet" src="https://www.kasandbox.org/programming-images/space/planet.png">
            
            <div id="greeting">
                <p>Hello! Welcome to position planet!</p>
            </div>
        </div>
        
        <img id="creature" src="https://www.kasandbox.org/programming-images/avatars/mr-pink.png">
        
    </body>
</html>
